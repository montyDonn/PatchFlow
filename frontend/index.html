<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PatchFlow - Change Management</title>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'blue';
        const doc = document.documentElement;
        doc.classList.remove('theme-blue', 'theme-white', 'theme-black', 'light');
        if (theme === 'white' || theme === 'light') {
          doc.classList.add('theme-white', 'light');
        } else if (theme === 'black') {
          doc.classList.add('theme-black');
        } else {
          doc.classList.add('theme-blue');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
