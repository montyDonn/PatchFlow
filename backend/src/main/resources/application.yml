spring:
  application:
    name: patchflow-api

  mail:
    host: ${SPRING_MAIL_HOST:10.1.2.50}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:info@upcl.org}
    password: ${SPRING_MAIL_PASSWORD:your_mail_password_here}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false

  datasource:
    url: jdbc:mysql://10.1.2.24:3306/postgres?useSSL=false&allowPublicKeyRetrieval=true
    username: ps_user
    password: ${SPRING_DATASOURCE_PASSWORD:Upcl@2602}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      pool-name: PatchFlowHikariCP
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 5
      minimum-idle: 1
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        globally_quoted_identifiers: true
        default_batch_fetch_size: 16
    show-sql: false
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: ${PORT:5001}

  error:
    include-message: always
    include-binding-errors: always

app:
  upload-dir: ${UPLOAD_DIR:./uploads}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  whatsapp:
    url: ${WHATSAPP_API_URL:https://mediaapi.smsgupshup.com/GatewayAPI/rest?}
    userid: ${WHATSAPP_USER_ID:2000251687}
    password: ${WHATSAPP_PASSWORD:your_whatsapp_password_here}

  sms:
    metering-url: ${METERING_SERVICE_URL:http://10.1.2.60:8080/metering/SmsStack}

logging:
  level:
    root: WARN
    com.patchflow: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.results: WARN
    org.springframework.jdbc: WARN
    com.zaxxer.hikari: WARN